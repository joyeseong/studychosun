<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>조선대 공부 도우미</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f7fa;
}

.page {
    display: none;
    padding: 40px;
}

.active {
    display: block;
}

.center {
    text-align: center;
    margin-top: 100px;
}

.logo-title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.logo-title img {
    height: 50px;
}

input {
    padding: 10px;
    margin: 5px;
    width: 200px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    background: #4A90E2;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.card {
    background: white;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
    display: inline-block;
    width: 200px;
    cursor: pointer;
    text-align: center;
}

.topbar {
    background: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #ddd;
}

.topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.topbar-left img {
    height: 30px;
}

.list-item {
    background: white;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    cursor: pointer;
}

/* 사전예약 카드 */
.reserve-box {
    margin-top: 40px;
    padding: 20px;
    background: white;
    border-radius: 10px;
    text-align: center;
}
</style>

</head>
<body>

<!-- 로그인 -->
<div id="login" class="page active center">
    <div class="logo-title">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a8/Chosun-basic1.png">
        <h1>조선대 공부 도우미</h1>
    </div>

    <input placeholder="ID"><br>
    <input type="password" placeholder="Password"><br>
    <button onclick="go('main')">로그인</button>
	
	<div class="reserve-box">
    <h3>사전예약 진행중!</h3>
    <p>지금 참여하고 포인트를 받아보세요</p>

    <a href="https://forms.gle/itBDCXktupgzPX997" target="_blank">
        <button>사전예약 바로가기</button>
    </a>

    <br><br>

    <img src="images/qr.png" style="width:500px;">
	</div>
</div>

<!-- 메인 -->
<div id="main" class="page">
    <div class="topbar">
        <div class="topbar-left">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a8/Chosun-basic1.png">
            <strong>조선대 공부 도우미</strong>
        </div>
        <div id="pointDisplay">포인트: 120P</div>
    </div>

    <h2>과목 선택</h2>

    <div class="card" onclick="openBoard('db')">데이터베이스</div>
    <div class="card" onclick="openBoard('network')">데이터통신</div>
    <div class="card" onclick="openBoard('algo')">알고리즘</div>
    <div class="card" onclick="openBoard('ai')">AI 프로그래밍</div>

    <!-- 사전예약 영역 -->
    <div class="reserve-box">
        <h3>사전예약 진행중!</h3>
        <p>지금 참여하고 포인트를 받아보세요</p>

        <!-- 여기에 링크 넣어라 -->
        <a href="https://forms.gle/itBDCXktupgzPX997" target="_blank">
            <button>사전예약 바로가기</button>
        </a>

        <br><br>

        <img src="images/qr.png" style="width:500px;">
    </div>
</div>

<!-- 게시판 -->
<div id="board" class="page"></div>

<!-- 게시글 -->
<div id="post" class="page">
    <button onclick="go('board')">← 뒤로</button>

    <h2 id="postTitle"></h2>
    <p id="postAuthor"></p>
    <p id="postPoint"></p>

    <div id="postImages" style="display:none;"></div>

    <button onclick="download()">다운로드</button>
</div>

<!-- 업로드 -->
<div id="upload" class="page">
    <button onclick="go('board')">← 뒤로</button>

    <h2>자료 업로드</h2>

    <input placeholder="제목"><br>
    <input placeholder="설명"><br>

    <button onclick="alert('업로드 완료! +10P')">
        업로드
    </button>
</div>

<script>

// 페이지 이동
function go(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}

// 포인트
let point = 120;

// 게시글 데이터
const posts = {
    db: {
        title: "데이터베이스 시험범위 정리",
        author: "조예성",
        point: 5,
        images: ["images/db1.jpg", "images/db2.jpg"]
    },
    network: {
        title: "데이터통신 정리",
        author: "조예성",
        point: 5,
        images: ["images/net1.jpg", "images/net2.jpg"]
    },
    algo: {
        title: "알고리즘",
        author: "조예성",
        point: 5,
        images: []
    },
    ai: {
        title: "AI 프로그래밍",
        author: "조예성",
        point: 5,
        images: []
    }
};

let currentPost = null;

// 과목 이름
function getSubjectName(key) {
    if (key === "db") return "데이터베이스";
    if (key === "network") return "데이터통신";
    if (key === "algo") return "알고리즘";
    if (key === "ai") return "AI 프로그래밍";
}

// 게시판 열기
function openBoard(subject) {
    const board = document.getElementById("board");

    board.innerHTML = `
        <button onclick="go('main')">← 뒤로</button>
        <h2>${getSubjectName(subject)} 게시판</h2>
        <button onclick="go('upload')">글쓰기</button>
    `;

    if (subject === "db") {
        board.innerHTML += `<div class="list-item" onclick="openPost('db')">데이터베이스 시험범위 정리 (5P)</div>`;
    }

    if (subject === "network") {
        board.innerHTML += `<div class="list-item" onclick="openPost('network')">데이터통신 정리 (5P)</div>`;
    }

    if (subject === "algo") {
        board.innerHTML += `<div class="list-item" onclick="openPost('algo')">알고리즘 (5P)</div>`;
    }

    if (subject === "ai") {
        board.innerHTML += `<div class="list-item" onclick="openPost('ai')">AI 프로그래밍 (5P)</div>`;
    }

    go('board');
}

// 게시글 열기
function openPost(key) {
    currentPost = posts[key];

    document.getElementById("postTitle").innerText = currentPost.title;
    document.getElementById("postAuthor").innerText = "작성자: " + currentPost.author;
    document.getElementById("postPoint").innerText = "포인트: " + currentPost.point + "P";

    const imgDiv = document.getElementById("postImages");
    imgDiv.innerHTML = "";
    imgDiv.style.display = "none";

    if (currentPost.images.length === 0) {
        imgDiv.innerHTML = "<p>준비중입니다!</p>";
    } else {
        imgDiv.innerHTML = `<div style="display:flex; gap:20px;">`;

        currentPost.images.forEach(img => {
            imgDiv.innerHTML += `<img src="${img}" style="width:400px; border-radius:10px;">`;
        });

        imgDiv.innerHTML += `</div>`;
    }

    go('post');
}

// 다운로드
function download() {
    if (!currentPost) return;

    point -= currentPost.point;
    document.getElementById("pointDisplay").innerText = "포인트: " + point + "P";

    alert("포인트 -" + currentPost.point + "P 차감!");

    document.getElementById("postImages").style.display = "block";
}

</script>

</body>
</html>
